# Task 08: 语音识别 (Speech Recognition)
# 模型: M5 (自定义CNN) | 数据集: SpeechCommands | 框架: PyTorch + TorchAudio
# 注意：torchaudio 必须通过 conda 的 pytorch 渠道安装，确保与 torch 的 CUDA 版本严格一致
name: dl_task08
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pytorch
  - torchaudio
  - pytorch-cuda=12.4
  - numpy
  - pip
  - pip:
    - librosa
    - soundfile
    - gradio
